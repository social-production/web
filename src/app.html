<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png?v=2" />
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('sp_theme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.dataset.theme = theme;
            document.body && (document.body.dataset.theme = theme);
          }
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" data-theme="light">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
